<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 250px;
            padding: 16px;
            font-family: sans-serif;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        button:disabled {
            background: #aaa;
            cursor: not-allowed;
        }

        #status {
            margin-top: 10px;
            min-height: 20px;
            text-align: center;
            color: #555;
        }

        #status.error  { color: #c00; }
        #status.success { color: #0a0; }
        #status.warning { color: #f90; }
    </style>
</head>
<body>
    <button id="downloadBtn">Download Dataset</button>
    <div id="status"></div>

    <script src="popup.js"></script>
</body>
</html>
